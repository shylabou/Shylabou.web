<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Shylabou | Official</title>
    <link href="https://fonts.googleapis.com/css2?family=Dancing+Script:wght@600&family=Playfair+Display:ital,wght@0,400;1,500&display=swap" rel="stylesheet">
    
    <style>
        body {
            background-color: #f5f5dc; /* Fondo Beige */
            color: #5d4037; /* Letras Marrón Chocolate */
            margin: 0;
            font-family: 'Playfair Display', serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
        }

        /* Menú de navegación superior */
        nav {
            width: 100%;
            padding: 25px 0;
            display: flex;
            justify-content: center;
            gap: 40px;
            background-color: rgba(93, 64, 55, 0.03);
            border-bottom: 1px solid rgba(93, 64, 55, 0.1);
        }

        nav a {
            text-decoration: none;
            color: #5d4037;
            font-size: 0.9rem;
            text-transform: uppercase;
            letter-spacing: 2px;
            transition: 0.3s;
        }

        nav a:hover {
            opacity: 0.5;
        }

        /* Contenedor principal */
        .main-container {
            text-align: center;
            margin-top: 80px;
            padding: 20px;
            max-width: 600px;
        }

        h1 {
            font-family: 'Dancing Script', cursive; /* Letra Cursiva */
            font-size: 4.5rem;
            margin: 0;
            font-weight: 600;
        }

        .subtitle {
            font-style: italic;
            font-size: 1.3rem;
            margin-top: 5px;
            margin-bottom: 50px;
            opacity: 0.8;
        }

        /* Botones de menú/enlaces */
        .menu-links {
            display: flex;
            flex-direction: column;
            gap: 20px;
            width: 100%;
            max-width: 300px;
            margin: 0 auto;
        }

        .link-btn {
            border: 1px solid #5d4037;
            color: #5d4037;
            padding: 15px;
            text-decoration: none;
            border-radius: 2px; /* Estilo más cuadrado y elegante */
            font-size: 1rem;
            letter-spacing: 1px;
            transition: all 0.4s;
        }

        .link-btn:hover {
            background-color: #5d4037;
            color: #f5f5dc;
        }

        footer {
            margin-top: auto;
            padding: 50px;
            font-size: 0.8rem;
            letter-spacing: 1px;
        }
    </style>
</head>
<body>

    <nav>
        <a href="#">Inicio</a>
        <a href="#">Portafolio</a>
        <a href="#">Sobre mí</a>
        <a href="mailto:tu-correo@ejemplo.com">Contacto</a>
    </nav>

    <div class="main-container">
        <h1>Shylabou</h1>
        <div class="subtitle">Curated Space & Creative Content</div>

        <div class="menu-links">
            <a href="#" class="link-btn">Instagram</a>
            <a href="#" class="link-btn">Galería de Proyectos</a>
            <a href="mailto:tu-correo@ejemplo.com" class="link-btn">Enviar Mensaje</a>
        </div>
    </div>

    <footer>
        SHYLABOU &copy; 2026
    </footer>

</body>
</html>

<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SHYLABOU | Studio</title>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@300;400;500&display=swap" rel="stylesheet">
    <style>
        :root {
            --black: #000000;
            --white: #ffffff;
            --gray: #f9f9f9;
        }

        body {
            margin: 0;
            font-family: 'Montserrat', sans-serif;
            background-color: var(--white);
            color: var(--black);
        }

        /* Barra de anuncios */
        .top-bar {
            background-color: var(--black);
            color: var(--white);
            text-align: center;
            padding: 8px;
            font-size: 10px;
            letter-spacing: 2px;
            text-transform: uppercase;
        }

        /* Encabezado */
        header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 20px;
            border-bottom: 1px solid #eee;
            position: sticky;
            top: 0;
            background: white;
            z-index: 100;
        }

        .logo {
            font-size: 24px;
            font-weight: 500;
            letter-spacing: 4px;
            text-transform: uppercase;
            text-decoration: none;
            color: black;
        }

        /* Navegación */
        nav {
            display: flex;
            justify-content: center;
            gap: 20px;
            padding: 15px 0;
            font-size: 11px;
            text-transform: uppercase;
            letter-spacing: 1px;
            border-bottom: 1px solid #f5f5f5;
        }

        nav a {
            text-decoration: none;
            color: #666;
            transition: 0.3s;
        }

        nav a:hover { color: black; }

        /* Contenido principal */
        .container {
            padding: 20px;
            max-width: 1200px;
            margin: 0 auto;
        }

        .section-title {
            text-align: center;
            text-transform: uppercase;
            letter-spacing: 2px;
            font-size: 13px;
            margin: 40px 0;
            font-weight: 400;
        }

        .grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 15px;
        }

        .item {
            text-align: center;
            margin-bottom: 25px;
        }

        .item-image {
            background-color: var(--gray);
            aspect-ratio: 1/1;
            width: 100%;
            display: flex;
            align-items: center;
            justify-content: center;
            color: #ccc;
            font-size: 11px;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .item-info {
            margin-top: 12px;
            font-size: 12px;
            letter-spacing: 0.5px;
        }

        /* Botón de WhatsApp flotante */
        .whatsapp-btn {
            position: fixed;
            bottom: 20px;
            right: 20px;
            background-color: #25d366;
            width: 55px;
            height: 55px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: 0 4px 15px rgba(0,0,0,0.15);
            text-decoration: none;
            z-index: 1000;
            transition: transform 0.3s;
        }

        .whatsapp-btn:hover { transform: scale(1.1); }
        .whatsapp-btn img { width: 30px; height: 30px; }

        footer {
            text-align: center;
            padding: 50px 20px;
            font-size: 10px;
            letter-spacing: 1px;
            color: #999;
            text-transform: uppercase;
        }
    </style>
</head>
<body>

    <div class="top-bar">Envíos a toda Venezuela — Shylabou Official</div>

    <header>
        <div style="font-size: 18px; cursor: pointer;">☰</div>
        <a href="#" class="logo">SHYLABOU</a>
        <div style="font-size: 18px; cursor: pointer;">🔍</div>
    </header>

    <nav>
        <a href="#">Colección</a>
        <a href="https://instagram.com/shylabou" target="_blank">Instagram</a>
        <a href="https://wa.me/584128624428" target="_blank">Contacto</a>
    </nav>

    <div class="container">
        <h2 class="section-title">Novedades</h2>
        
        <div class="grid">
            <div class="item">
                <div class="item-image">Cargar Imagen</div>
                <div class="item-info">Pieza Minimalista 01</div>
            </div>
            <div class="item">
                <div class="item-image">Cargar Imagen</div>
                <div class="item-info">Pieza Minimalista 02</div>
            </div>
        </div>
    </div>

    <footer>
        SHYLABOU &copy; 2026 | Todos los derechos reservados.
    </footer>

    <a href="https://wa.me/584128624428" class="whatsapp-btn" target="_blank">
        <img src="https://upload.wikimedia.org/wikipedia/commons/6/6b/WhatsApp.svg" alt="WhatsApp">
    </a>

</body>
</html>
